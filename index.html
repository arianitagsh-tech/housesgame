<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House's Game — Choose Your Character</title>
  <style>
    /* ── Theme (CSS custom properties) ── */
    :root {
      --bg: #0a0a0f;
      --bg-card: #14141f;
      --border: #2a2a3a;
      --border-hover: #7c5cff;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.3);
      --radius: 16px;
      --transition: 0.25s ease;
      /* Character colors */
      --color-speedster: #ff4d4d;
      --color-hipster: #b44dff;
      --color-engineer: #4dff6b;
      --color-shadow: #4d8bff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(124, 92, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(124, 92, 255, 0.04) 0%, transparent 60%);
    }

    /* ── Screen switching ── */
    .screen { display: none; width: 100%; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── SCREEN 1: Character Selection ── */
    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c4b5fd, #7c5cff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.4rem;
    }

    .header p {
      color: var(--text-dim);
      font-size: 1.15rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      width: 100%;
    }

    .character-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      position: relative;
    }

    .character-card:hover,
    .character-card:focus-visible {
      border-color: var(--border-hover);
      box-shadow: 0 0 30px var(--accent-glow);
      transform: translateY(-4px);
      outline: none;
    }

    .character-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), inset 0 0 40px rgba(124, 92, 255, 0.08);
    }

    .character-card.selected::after {
      content: '✓';
      position: absolute;
      top: 12px;
      right: 14px;
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.9rem;
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .character-card img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
      background: #1a1a2e;
    }

    .character-label {
      padding: 0.9rem 1rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-dim);
      transition: color var(--transition);
    }

    .character-card:hover .character-label,
    .character-card.selected .character-label {
      color: var(--text);
    }

    /* ── Button ── */
    .btn {
      margin-top: 2.5rem;
      padding: 1rem 3rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c5cff, #5b3fe8);
      color: #fff;
      box-shadow: 0 4px 24px var(--accent-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 36px rgba(124, 92, 255, 0.5);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      margin-left: 1rem;
    }

    .btn-secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .selected-info {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--accent);
      font-weight: 600;
      min-height: 1.5em;
    }

    /* ── SCREEN 2: Planet Orbit Map ── */
    .map-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .map-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 0.3rem;
    }

    .map-header .subtitle {
      color: var(--text-dim);
      font-size: 1rem;
    }

    .player-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
    }
    .orbit-scene {
      position: relative;
      width: 600px;
      height: 600px;
      margin: 0 auto;
    }

    .orbit-center {
      position: absolute;
      top: 50%; left: 50%;
      width: 70px; height: 70px;
      margin: -35px 0 0 -35px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff9c4, #ffb300, #e65100);
      box-shadow: 0 0 60px rgba(255, 179, 0, 0.7), 0 0 120px rgba(255, 152, 0, 0.3);
      z-index: 10;
      animation: sunPulse 2s ease-in-out infinite;
    }

    @keyframes sunPulse {
      0%, 100% { box-shadow: 0 0 60px rgba(255, 179, 0, 0.7), 0 0 120px rgba(255, 152, 0, 0.3); }
      50%      { box-shadow: 0 0 90px rgba(255, 179, 0, 0.9), 0 0 160px rgba(255, 152, 0, 0.5); }
    }

    .orbit-track {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1px dashed;
      opacity: 0.15;
      pointer-events: none;
    }

    .orbit-item {
      position: absolute;
      top: 50%; left: 50%;
      /* Planet sits at radius distance from center */
      transform-origin: 0 0;
    }

    .planet-wrapper {
      position: absolute;
      /* Offset so planet is at orbit edge */
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: filter 0.2s;
      /* Counter-rotate name to keep it upright */
    }

    .planet-wrapper:hover {
      filter: brightness(1.3);
    }

    .planet-wrapper .planet-sphere {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px var(--glow-color), 0 0 60px var(--glow-color);
      transition: box-shadow 0.3s;
    }

    .planet-wrapper .planet-name {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      white-space: nowrap;
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--planet-color);
    }

    .planet-wrapper:hover .planet-sphere {
      box-shadow: 0 0 50px var(--glow-color), 0 0 90px var(--glow-color);
    }

    /* ── Atmospheric glow ring ── */
    .planet-atmosphere {
      position: absolute;
      top: -6px; left: -6px;
      right: -6px; bottom: -6px;
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Surface band for gas giants ── */
    .planet-band {
      position: absolute;
      left: -10%;
      right: -10%;
      height: 18%;
      border-radius: 50%;
      opacity: 0.3;
    }

    .planet-band.b1 { top: 12%; }
    .planet-band.b2 { top: 30%; }
    .planet-band.b3 { top: 48%; }
    .planet-band.b4 { top: 66%; }

    /* ── Specular highlight ── */
    .planet-specular {
      position: absolute;
      top: 12%; left: 18%;
      width: 28%; height: 28%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Crater (for rocky planets) ── */
    .planet-crater {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .planet-crater::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      right: 2px; bottom: 2px;
      border-radius: 50%;
    }

    /* ── RED: Rocky / Mars-like planet ── */
    .planet-red {
      background: radial-gradient(circle at 35% 30%, #ff9999, #e04040 35%, #991111 70%, #4a0000);
    }
    .planet-red .planet-atmosphere { box-shadow: inset 0 0 20px rgba(255,100,80,0.6); }
    .planet-red .planet-crater.c1 { top: 55%; left: 60%; width: 22%; height: 22%; background: rgba(120,10,10,0.35); box-shadow: inset 0 1px 1px rgba(255,150,150,0.3); }
    .planet-red .planet-crater.c2 { top: 20%; left: 15%; width: 14%; height: 14%; background: rgba(100,10,10,0.3); }
    .planet-red .planet-crater.c3 { top: 40%; left: 70%; width: 10%; height: 10%; background: rgba(150,20,20,0.25); }

    /* ── PURPLE: Gas giant with bands ── */
    .planet-purple {
      background: radial-gradient(circle at 35% 30%, #e0c0ff, #9944dd 30%, #551199 60%, #2a0055);
    }
    .planet-purple .planet-atmosphere { box-shadow: inset 0 0 20px rgba(180,100,255,0.5); }
    .planet-purple .planet-band.b1 { background: rgba(200,160,255,0.3); }
    .planet-purple .planet-band.b2 { background: rgba(140,60,220,0.35); }
    .planet-purple .planet-band.b3 { background: rgba(220,180,255,0.25); }
    .planet-purple .planet-band.b4 { background: rgba(100,40,180,0.3); }

    /* ── GREEN: Earth-like with clouds ── */
    .planet-green {
      background: radial-gradient(circle at 35% 30%, #99ffcc, #22aa55 35%, #116633 65%, #053311);
    }
    .planet-green .planet-atmosphere { box-shadow: inset 0 0 22px rgba(100,255,180,0.5); }
    .planet-green .planet-band.b1 { background: rgba(180,255,220,0.3); width: 22%; height: 12%; top: 20%; left: -5%; }
    .planet-green .planet-band.b2 { background: rgba(140,240,200,0.25); width: 35%; height: 10%; top: 42%; left: 8%; }
    .planet-green .planet-band.b3 { background: rgba(160,255,210,0.2); width: 18%; height: 8%; top: 62%; left: 25%; }

    /* ── BLUE: Ice giant with deep atmosphere ── */
    .planet-blue {
      background: radial-gradient(circle at 35% 30%, #aaddff, #3377cc 35%, #113388 65%, #051144);
    }
    .planet-blue .planet-atmosphere { box-shadow: inset 0 0 22px rgba(120,180,255,0.55); }
    .planet-blue .planet-band.b1 { background: rgba(150,210,255,0.35); }
    .planet-blue .planet-band.b2 { background: rgba(60,120,220,0.3); }
    .planet-blue .planet-band.b3 { background: rgba(180,220,255,0.25); }

    /* ── Planet ring (Saturn-style) ── */
    .planet-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid;
      opacity: 0.3;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      pointer-events: none;
    }

    .map-back-btn {
      margin-top: 3rem;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 0.7rem 2rem;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      transition: all var(--transition);
    }

    .map-back-btn:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    /* ── Stars background ── */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: -1;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 3rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ── Stars background ── -->
  <div class="stars" id="stars"></div>

  <!-- ═══════════════════════════════════════════
       SCREEN 1: Character Selection
       ═══════════════════════════════════════════ -->
  <div class="screen active" id="screenSelect">
    <div class="header">
      <h1>Choose Your Character</h1>
      <p>Select one to begin the adventure</p>
    </div>

    <div class="character-grid" id="characterGrid"></div>

    <p class="selected-info" id="selectedInfo"></p>

    <div style="text-align:center">
      <button class="btn btn-primary" id="btnStart" disabled onclick="startGame()">Start Game</button>
      <button class="btn btn-secondary" id="btnReset">Reset</button>
    </div>

    <p class="footer">&copy; House's Game</p>
  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 2: Planet Map
       ═══════════════════════════════════════════ -->
  <div class="screen" id="screenMap">
    <div class="map-header">
      <div class="player-badge" id="playerBadge"></div>
      <h1>Select a Planet to Invade</h1>
      <div class="subtitle">Click an orbiting planet to attack</div>
    </div>

    <div class="orbit-scene" id="orbitScene"></div>

    <button class="map-back-btn" id="btnBack">← Back to Character Select</button>
    <p class="footer" style="margin-top:1rem">&copy; House's Game</p>
  </div>

  <script>
    (function() {
      // ── Character data with colors ──
      const characters = [
        { id: 1, name: 'Speedster', src: 'assets/character-1.jpg', color: '#ff4d4d', colorName: 'red'    },
        { id: 2, name: 'Hipster',    src: 'assets/character-2.jpg', color: '#b44dff', colorName: 'purple' },
        { id: 3, name: 'Engineer',   src: 'assets/character-3.jpg', color: '#4dff6b', colorName: 'green'  },
        { id: 4, name: 'Shadow',     src: 'assets/character-4.jpg', color: '#4d8bff', colorName: 'blue'   },
      ];

      const STORAGE_KEY = 'housesgame_selected_character';
      let selectedId = null;

      // ── DOM refs ──
      const screenSelect = document.getElementById('screenSelect');
      const screenMap    = document.getElementById('screenMap');
      const grid         = document.getElementById('characterGrid');
      const btnStart     = document.getElementById('btnStart');
      const btnReset     = document.getElementById('btnReset');
      const selectedInfo = document.getElementById('selectedInfo');
      const orbitScene   = document.getElementById('orbitScene');
      const playerBadge  = document.getElementById('playerBadge');
      const btnBack      = document.getElementById('btnBack');

      // ── Stars ──
      const starsEl = document.getElementById('stars');
      for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top  = Math.random() * 100 + '%';
        const size = Math.random() * 2.5 + 1;
        s.style.width  = size + 'px';
        s.style.height = size + 'px';
        s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
        s.style.setProperty('--delay', Math.random() * 5 + 's');
        starsEl.appendChild(s);
      }

      // ── Build character cards ──
      characters.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'character-card';
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'radio');
        card.setAttribute('aria-checked', 'false');
        card.dataset.id = ch.id;

        const img = document.createElement('img');
        img.src = ch.src;
        img.alt = ch.name;
        img.loading = 'lazy';

        const label = document.createElement('div');
        label.className = 'character-label';
        label.textContent = ch.name;

        card.appendChild(img);
        card.appendChild(label);

        card.addEventListener('click', () => selectCharacter(ch.id));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCharacter(ch.id);
          }
        });

        grid.appendChild(card);
      });

      function selectCharacter(id) {
        selectedId = id;
        document.querySelectorAll('.character-card').forEach(c => {
          const isSelected = +c.dataset.id === id;
          c.classList.toggle('selected', isSelected);
          c.setAttribute('aria-checked', isSelected);
        });
        localStorage.setItem(STORAGE_KEY, id);
        const ch = characters.find(c => c.id === id);
        selectedInfo.textContent = 'Selected: ' + ch.name;
        btnStart.disabled = false;
      }

      function clearSelection() {
        selectedId = null;
        localStorage.removeItem(STORAGE_KEY);
        document.querySelectorAll('.character-card').forEach(c => {
          c.classList.remove('selected');
          c.setAttribute('aria-checked', 'false');
        });
        selectedInfo.textContent = '';
        btnStart.disabled = true;
      }

      // ── Switch screens ──
      function showScreen(name) {
        screenSelect.classList.toggle('active', name === 'select');
        screenMap.classList.toggle('active', name === 'map');
      }

      // ── Orbit animation state ──
      let orbitAnimId = null;

      // ── Build orbit map ──
      function buildMap(playerCh) {
        // Stop any running animation
        if (orbitAnimId) cancelAnimationFrame(orbitAnimId);
        orbitScene.innerHTML = '';

        // Player badge
        playerBadge.textContent = '⚔ You: ' + playerCh.name;
        playerBadge.style.background = playerCh.color + '22';
        playerBadge.style.color = playerCh.color;
        playerBadge.style.border = '1px solid ' + playerCh.color + '44';

        // Central sun
        const sun = document.createElement('div');
        sun.className = 'orbit-center';
        orbitScene.appendChild(sun);

        // Enemy planets
        const enemies = characters.filter(c => c.id !== playerCh.id);
        const radii = [220, 170, 120]; // px from center
        const speeds = [0.003, 0.005, 0.007]; // radians per frame
        const sceneW = 600, sceneH = 600;

        // Orbit track rings
        radii.forEach(r => {
          const track = document.createElement('div');
          track.className = 'orbit-track';
          const d = r * 2;
          track.style.width  = d + 'px';
          track.style.height = d + 'px';
          track.style.marginLeft = -r + 'px';
          track.style.marginTop  = -r + 'px';
          track.style.borderColor = playerCh.color + '44';
          orbitScene.appendChild(track);
        });

        const planetData = enemies.map((enemy, i) => {
          // Orbit item (will rotate)
          const item = document.createElement('div');
          item.className = 'orbit-item';

          // Planet wrapper (counter-rotates to keep name upright, sits at orbit edge)
          const wrapper = document.createElement('div');
          wrapper.className = 'planet-wrapper';
          const halfPlanet = 45;
          wrapper.style.left = (radii[i] - halfPlanet) + 'px';
          wrapper.style.top  = '-' + halfPlanet + 'px';

          const sphere = document.createElement('div');
          sphere.className = 'planet-sphere planet-' + enemy.colorName;
          sphere.style.setProperty('--glow-color', enemy.color + '66');
          sphere.style.setProperty('--planet-color', enemy.color);

          // Atmosphere glow
          const atmos = document.createElement('div');
          atmos.className = 'planet-atmosphere';
          sphere.appendChild(atmos);

          // Specular highlight
          const spec = document.createElement('div');
          spec.className = 'planet-specular';
          sphere.appendChild(spec);

          // Surface details by color
          if (enemy.colorName === 'red') {
            // Rocky planet with craters
            for (let ci = 1; ci <= 3; ci++) {
              const crater = document.createElement('div');
              crater.className = 'planet-crater c' + ci;
              sphere.appendChild(crater);
            }
          } else if (enemy.colorName === 'purple') {
            // Gas giant with bands
            for (let bi = 1; bi <= 4; bi++) {
              const band = document.createElement('div');
              band.className = 'planet-band b' + bi;
              sphere.appendChild(band);
            }
          } else if (enemy.colorName === 'green') {
            // Earth-like with cloud patches
            for (let bi = 1; bi <= 3; bi++) {
              const band = document.createElement('div');
              band.className = 'planet-band b' + bi;
              sphere.appendChild(band);
            }
          } else if (enemy.colorName === 'blue') {
            // Ice giant with bands
            for (let bi = 1; bi <= 3; bi++) {
              const band = document.createElement('div');
              band.className = 'planet-band b' + bi;
              sphere.appendChild(band);
            }
          }

          // Saturn-style ring
          const ring = document.createElement('div');
          ring.className = 'planet-ring';
          ring.style.borderColor = enemy.color;
          ring.style.width  = '130px';
          ring.style.height = '32px';
          sphere.appendChild(ring);

          const name = document.createElement('div');
          name.className = 'planet-name';
          name.style.setProperty('--planet-color', enemy.color);
          name.textContent = enemy.name;

          wrapper.appendChild(sphere);
          wrapper.appendChild(name);
          item.appendChild(wrapper);
          orbitScene.appendChild(item);

          // Click handler on wrapper
          wrapper.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('Invading ' + enemy.name + "'s planet!\n\nPlanet gameplay coming soon...");
          });

          return { item, wrapper, radius: radii[i], speed: speeds[i], angle: (i * Math.PI * 2) / 3, enemy };
        });

        // Animation loop
        let lastTime = 0;
        function animate(timestamp) {
          if (!lastTime) lastTime = timestamp;
          const dt = Math.min((timestamp - lastTime) / 1000, 0.1); // cap dt
          lastTime = timestamp;

          planetData.forEach(p => {
            p.angle += p.speed * (dt * 60); // normalize speed
            const deg = p.angle * (180 / Math.PI);
            p.item.style.transform = 'rotate(' + deg + 'deg)';
            // Counter-rotate wrapper to keep text upright
            p.wrapper.style.transform = 'rotate(' + (-deg) + 'deg)';
          });

          orbitAnimId = requestAnimationFrame(animate);
        }
        orbitAnimId = requestAnimationFrame(animate);
      }

      // ── Start Game → Show map ──
      function startGame() {
        if (!selectedId) return;
        const playerCh = characters.find(c => c.id === selectedId);
        buildMap(playerCh);
        showScreen('map');
      }
      window.startGame = startGame;

      btnStart.addEventListener('click', startGame);

      // ── Reset ──
      btnReset.addEventListener('click', clearSelection);

      // ── Back button ──
      btnBack.addEventListener('click', () => {
        showScreen('select');
      });

      // ── Restore previous selection ──
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        selectCharacter(+saved);
      }
    })();
  </script>

</body>
</html>
