<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House's Game</title>
  <style>
    :root {
      --bg: #0a0a0f; --bg-card: #14141f; --border: #2a2a3a;
      --border-hover: #7c5cff; --text: #e0e0e8; --text-dim: #8888a0;
      --accent: #7c5cff; --accent-glow: rgba(124,92,255,0.3);
      --radius: 16px; --transition: 0.25s ease;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(124,92,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(124,92,255,0.04) 0%, transparent 60%);
    }
    .screen { display: none; width: 100%; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ═══ SCREEN 1: Character Selection ═══ */
    .header { text-align: center; margin-bottom: 3rem; }
    .header h1 {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c4b5fd, #7c5cff, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.4rem;
    }
    .header p { color: var(--text-dim); font-size: 1.15rem; }
    .character-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem; max-width: 1100px; width: 100%;
    }
    .character-card {
      background: var(--bg-card); border: 2px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      position: relative;
    }
    .character-card:hover, .character-card:focus-visible {
      border-color: var(--border-hover); box-shadow: 0 0 30px var(--accent-glow);
      transform: translateY(-4px); outline: none;
    }
    .character-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), inset 0 0 40px rgba(124,92,255,0.08);
    }
    .character-card.selected::after {
      content: '✓'; position: absolute; top: 12px; right: 14px; width: 32px; height: 32px;
      background: var(--accent); border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: bold; font-size: 0.9rem;
      box-shadow: 0 0 14px var(--accent-glow);
    }
    .character-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: #1a1a2e; }
    .character-label { padding: 0.9rem 1rem; text-align: center; font-weight: 600; font-size: 1rem; color: var(--text-dim); transition: color var(--transition); }
    .character-card:hover .character-label, .character-card.selected .character-label { color: var(--text); }

    .btn {
      margin-top: 2.5rem; padding: 1rem 3rem; font-size: 1.1rem; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer; transition: all var(--transition);
      font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, #7c5cff, #5b3fe8); color: #fff; box-shadow: 0 4px 24px var(--accent-glow); }
    .btn-primary:hover { box-shadow: 0 6px 36px rgba(124,92,255,0.5); transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; transform: none; }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-left: 1rem; }
    .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
    .selected-info { text-align: center; margin-top: 1.5rem; color: var(--accent); font-weight: 600; min-height: 1.5em; }

    /* ═══ SCREEN 2: Orbit Map ═══ */
    .map-header { text-align: center; margin-bottom: 1.5rem; }
    .map-header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 0.3rem; }
    .map-header .subtitle { color: var(--text-dim); font-size: 1rem; }
    .player-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1.2rem; border-radius: 50px; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.8rem;
    }
    .orbit-scene { position: relative; width: 600px; height: 600px; margin: 0 auto; }
    .orbit-center {
      position: absolute; top: 50%; left: 50%; width: 70px; height: 70px;
      margin: -35px 0 0 -35px; border-radius: 50%;
      background: radial-gradient(circle, #fff9c4, #ffb300, #e65100);
      box-shadow: 0 0 60px rgba(255,179,0,0.7), 0 0 120px rgba(255,152,0,0.3);
      z-index: 10; animation: sunPulse 2s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100%{box-shadow:0 0 60px rgba(255,179,0,0.7),0 0 120px rgba(255,152,0,0.3)}
      50%{box-shadow:0 0 90px rgba(255,179,0,0.9),0 0 160px rgba(255,152,0,0.5)}
    }
    .orbit-track { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px dashed; opacity: 0.15; pointer-events: none; }
    .orbit-item { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; }
    .planet-wrapper {
      position: absolute; display: flex; flex-direction: column; align-items: center;
      cursor: pointer; transition: filter 0.2s, opacity 0.3s;
    }
    .planet-wrapper.conquered { opacity: 0.3; pointer-events: none; filter: grayscale(0.8); }
    .planet-wrapper.conquered::after {
      content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-80%);
      font-size: 2rem; color: #4dff6b; z-index: 5; text-shadow: 0 0 20px #4dff6b;
    }
    .planet-wrapper:hover { filter: brightness(1.3); }
    .planet-wrapper.conquered:hover { filter: grayscale(0.8); }
    .planet-sphere {
      width: 90px; height: 90px; border-radius: 50%; position: relative; overflow: hidden;
      box-shadow: 0 0 30px var(--glow-color), 0 0 60px var(--glow-color); transition: box-shadow 0.3s;
    }
    .planet-wrapper:hover .planet-sphere { box-shadow: 0 0 50px var(--glow-color), 0 0 90px var(--glow-color); }
    .planet-name {
      margin-top: 0.5rem; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em;
      white-space: nowrap; text-transform: uppercase; text-shadow: 0 0 10px var(--planet-color);
    }
    .planet-atmosphere {
      position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
      border-radius: 50%; opacity: 0.35; pointer-events: none;
    }
    .planet-band { position: absolute; left: -10%; right: -10%; height: 18%; border-radius: 50%; opacity: 0.3; }
    .planet-band.b1{top:12%}.planet-band.b2{top:30%}.planet-band.b3{top:48%}.planet-band.b4{top:66%}
    .planet-specular {
      position: absolute; top: 12%; left: 18%; width: 28%; height: 28%; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, transparent 70%); pointer-events: none;
    }
    .planet-crater { position: absolute; border-radius: 50%; pointer-events: none; }
    .planet-crater::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border-radius: 50%; }
    .planet-red{background:radial-gradient(circle at 35% 30%,#ff9999,#e04040 35%,#991111 70%,#4a0000)}
    .planet-red .planet-atmosphere{box-shadow:inset 0 0 20px rgba(255,100,80,0.6)}
    .planet-red .planet-crater.c1{top:55%;left:60%;width:22%;height:22%;background:rgba(120,10,10,0.35);box-shadow:inset 0 1px 1px rgba(255,150,150,0.3)}
    .planet-red .planet-crater.c2{top:20%;left:15%;width:14%;height:14%;background:rgba(100,10,10,0.3)}
    .planet-red .planet-crater.c3{top:40%;left:70%;width:10%;height:10%;background:rgba(150,20,20,0.25)}
    .planet-purple{background:radial-gradient(circle at 35% 30%,#e0c0ff,#9944dd 30%,#551199 60%,#2a0055)}
    .planet-purple .planet-atmosphere{box-shadow:inset 0 0 20px rgba(180,100,255,0.5)}
    .planet-purple .planet-band.b1{background:rgba(200,160,255,0.3)}.planet-purple .planet-band.b2{background:rgba(140,60,220,0.35)}
    .planet-purple .planet-band.b3{background:rgba(220,180,255,0.25)}.planet-purple .planet-band.b4{background:rgba(100,40,180,0.3)}
    .planet-green{background:radial-gradient(circle at 35% 30%,#99ffcc,#22aa55 35%,#116633 65%,#053311)}
    .planet-green .planet-atmosphere{box-shadow:inset 0 0 22px rgba(100,255,180,0.5)}
    .planet-green .planet-band.b1{background:rgba(180,255,220,0.3);width:22%;height:12%;top:20%;left:-5%}
    .planet-green .planet-band.b2{background:rgba(140,240,200,0.25);width:35%;height:10%;top:42%;left:8%}
    .planet-green .planet-band.b3{background:rgba(160,255,210,0.2);width:18%;height:8%;top:62%;left:25%}
    .planet-blue{background:radial-gradient(circle at 35% 30%,#aaddff,#3377cc 35%,#113388 65%,#051144)}
    .planet-blue .planet-atmosphere{box-shadow:inset 0 0 22px rgba(120,180,255,0.55)}
    .planet-blue .planet-band.b1{background:rgba(150,210,255,0.35)}.planet-blue .planet-band.b2{background:rgba(60,120,220,0.3)}
    .planet-blue .planet-band.b3{background:rgba(180,220,255,0.25)}
    .planet-ring {
      position: absolute; border-radius: 50%; border: 3px solid; opacity: 0.3;
      top: 50%; left: 50%; transform: translate(-50%,-50%) rotateX(75deg); pointer-events: none;
    }
    .map-back-btn {
      margin-top: 3rem; background: transparent; color: var(--text-dim);
      border: 1px solid var(--border); padding: 0.7rem 2rem; border-radius: 50px;
      cursor: pointer; font-family: inherit; font-size: 0.95rem; transition: all var(--transition);
    }
    .map-back-btn:hover { border-color: var(--text-dim); color: var(--text); }

    /* ═══ SCREEN 3: Maze Game ═══ */
    #screenGame { padding: 1rem; }
    .game-hud {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 800px; margin-bottom: 0.8rem;
    }
    .game-hud .lives { font-size: 1.3rem; }
    .game-hud .planet-label { font-weight: 700; font-size: 1.1rem; }
    .game-hud .cups-collected { font-size: 0.9rem; color: var(--text-dim); }
    .game-hud .btn-leave { padding: 0.4rem 1.2rem; font-size: 0.85rem; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; font-family: inherit; }
    .game-hud .btn-leave:hover { border-color: #ff4d6a; color: #ff4d6a; }
    .game-canvas-wrap {
      position: relative; border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    #gameCanvas { display: block; background: #0a0a1a; }
    .game-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 2rem; font-weight: 800; text-align: center; pointer-events: none;
      text-shadow: 0 0 30px rgba(255,255,255,0.5);
      opacity: 0; transition: opacity 0.5s;
    }
    .game-msg.show { opacity: 1; }
    .game-controls { margin-top: 0.8rem; color: var(--text-dim); font-size: 0.8rem; }

    /* ═══ SCREEN 4: Win Screen ═══ */
    .win-container { text-align: center; max-width: 700px; }
    .win-container h1 {
      font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: winShine 2s ease-in-out infinite;
    }
    @keyframes winShine {
      0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}
    }
    .win-character {
      width: 200px; height: 200px; border-radius: 50%; object-fit: cover;
      border: 4px solid gold; box-shadow: 0 0 60px rgba(255,215,0,0.5);
      margin: 1.5rem 0;
    }
    .win-cups {
      display: flex; gap: 2rem; justify-content: center; margin: 1.5rem 0;
    }
    .win-cup {
      width: 60px; height: 70px; position: relative;
      display: flex; flex-direction: column; align-items: center;
      animation: cupFloat 1.5s ease-in-out infinite;
    }
    .win-cup:nth-child(2) { animation-delay: 0.3s; }
    .win-cup:nth-child(3) { animation-delay: 0.6s; }
    @keyframes cupFloat {
      0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}
    }
    .win-cup .cup-body {
      width: 40px; height: 35px; border-radius: 0 0 20px 20px;
      position: relative; box-shadow: 0 4px 15px var(--cup-glow);
    }
    .win-cup .cup-body::before {
      content: ''; position: absolute; top: -10px; left: -8px; right: -8px;
      height: 16px; border-radius: 10px 10px 0 0; background: inherit; opacity: 0.7;
    }
    .win-cup .cup-stem {
      width: 8px; height: 14px; background: #ccc;
    }
    .win-cup .cup-base {
      width: 28px; height: 6px; border-radius: 3px; background: #ccc;
    }
    .win-text { color: var(--text-dim); font-size: 1.2rem; margin: 1rem 0; }

    /* ═══ Stars ═══ */
    .stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: -1; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0;
    }
    @keyframes twinkle { 0%,100%{opacity:0.2}50%{opacity:0.9} }
    .footer { margin-top: 3rem; color: var(--text-dim); font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- ══════ SCREEN 1: Character Selection ══════ -->
<div class="screen active" id="screenSelect">
  <div class="header">
    <h1>Choose Your Character</h1>
    <p>Select one to begin the adventure</p>
  </div>
  <div class="character-grid" id="characterGrid"></div>
  <p class="selected-info" id="selectedInfo"></p>
  <div style="text-align:center">
    <button class="btn btn-primary" id="btnStart" disabled onclick="startGame()">Start Game</button>
    <button class="btn btn-secondary" id="btnReset">Reset</button>
  </div>
  <p class="footer">&copy; House's Game</p>
</div>

<!-- ══════ SCREEN 2: Planet Map ══════ -->
<div class="screen" id="screenMap">
  <div class="map-header">
    <div class="player-badge" id="playerBadge"></div>
    <h1>Select a Planet to Invade</h1>
    <div class="subtitle" id="mapSubtitle">Click an orbiting planet to attack</div>
  </div>
  <div class="orbit-scene" id="orbitScene"></div>
  <button class="map-back-btn" id="btnBack">← Back to Character Select</button>
  <p class="footer" style="margin-top:1rem">&copy; House's Game</p>
</div>

<!-- ══════ SCREEN 3: Maze Game ══════ -->
<div class="screen" id="screenGame">
  <div class="game-hud">
    <span class="lives" id="gameLives">❤️❤️❤️</span>
    <span class="planet-label" id="gamePlanetLabel"></span>
    <span class="cups-collected" id="gameCupsLabel"></span>
    <button class="btn-leave" id="btnLeave">✕ Leave</button>
  </div>
  <div class="game-canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div class="game-msg" id="gameMsg"></div>
  </div>
  <div class="game-controls">WASD to move • Mouse to aim • Click to shoot</div>
</div>

<!-- ══════ SCREEN 4: Win ══════ -->
<div class="screen" id="screenWin">
  <div class="win-container">
    <h1>🏆 Victory!</h1>
    <p style="color:var(--text-dim)">All planets conquered!</p>
    <img class="win-character" id="winCharacterImg" alt="Your character">
    <div class="win-cups" id="winCups"></div>
    <p class="win-text" id="winText"></p>
    <button class="btn btn-primary" id="btnPlayAgain">Play Again</button>
  </div>
  <p class="footer">&copy; House's Game</p>
</div>

<!-- ══════ Background Music ══════ -->
<audio id="bgMusic" loop preload="auto" src="assets/galactic-velocity-rush.mp3"></audio>

<script>
(function() {
  const characters = [
    { id:1, name:'Speedster', src:'assets/character-1.jpg', color:'#ff4d4d', colorName:'red'    },
    { id:2, name:'Hipster',    src:'assets/character-2.jpg', color:'#b44dff', colorName:'purple' },
    { id:3, name:'Engineer',   src:'assets/character-3.jpg', color:'#4dff6b', colorName:'green'  },
    { id:4, name:'Shadow',     src:'assets/character-4.jpg', color:'#4d8bff', colorName:'blue'   },
  ];
  const CHAR_KEY = 'housesgame_selected_character';
  const CUPS_KEY = 'housesgame_cups';
  let selectedId = null;
  let conqueredCups = []; // array of character ids whose cups we've collected
  let orbitAnimId = null;
  let gameAnimId = null;
  let bgMusic = document.getElementById('bgMusic');

  // ── DOM refs ──
  const screens = {
    select: document.getElementById('screenSelect'),
    map:    document.getElementById('screenMap'),
    game:   document.getElementById('screenGame'),
    win:    document.getElementById('screenWin'),
  };
  const grid       = document.getElementById('characterGrid');
  const btnStart   = document.getElementById('btnStart');
  const btnReset   = document.getElementById('btnReset');
  const selectedInfo = document.getElementById('selectedInfo');
  const orbitScene = document.getElementById('orbitScene');
  const playerBadge= document.getElementById('playerBadge');
  const mapSubtitle= document.getElementById('mapSubtitle');
  const btnBack    = document.getElementById('btnBack');
  const btnLeave   = document.getElementById('btnLeave');
  const gameCanvas = document.getElementById('gameCanvas');
  const gameMsg    = document.getElementById('gameMsg');
  const gameLives  = document.getElementById('gameLives');
  const gamePlanetLabel = document.getElementById('gamePlanetLabel');
  const gameCupsLabel   = document.getElementById('gameCupsLabel');
  const screenWin  = document.getElementById('screenWin');
  const winCharImg = document.getElementById('winCharacterImg');
  const winCupsDiv = document.getElementById('winCups');
  const winText    = document.getElementById('winText');
  const btnPlayAgain = document.getElementById('btnPlayAgain');

  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i=0;i<120;i++) {
    const s=document.createElement('div'); s.className='star';
    s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
    const sz=Math.random()*2.5+1; s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.setProperty('--dur',(Math.random()*3+2)+'s');
    s.style.setProperty('--delay',Math.random()*5+'s');
    starsEl.appendChild(s);
  }

  // ── Load saved state ──
  function loadCups() {
    try { conqueredCups = JSON.parse(localStorage.getItem(CUPS_KEY)) || []; }
    catch(e) { conqueredCups = []; }
  }
  loadCups();

  // ── Screen switching ──
  function showScreen(name) {
    Object.entries(screens).forEach(([k,v]) => v.classList.toggle('active', k===name));
    if (name==='game') startMusic();
  }

  // ── Music ──
  function startMusic() {
    bgMusic.volume = 0.3;
    bgMusic.play().catch(()=>{});
  }
  // Try to start music on first user interaction
  document.addEventListener('click', ()=>{ bgMusic.play().catch(()=>{}); }, {once:true});

  // ── Build character cards ──
  characters.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'character-card'; card.tabIndex = 0;
    card.setAttribute('role','radio'); card.setAttribute('aria-checked','false');
    card.dataset.id = ch.id;
    const img = document.createElement('img'); img.src=ch.src; img.alt=ch.name; img.loading='lazy';
    const label = document.createElement('div'); label.className='character-label'; label.textContent=ch.name;
    card.appendChild(img); card.appendChild(label);
    card.addEventListener('click', ()=>selectCharacter(ch.id));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();selectCharacter(ch.id);} });
    grid.appendChild(card);
  });

  function selectCharacter(id) {
    selectedId = id;
    document.querySelectorAll('.character-card').forEach(c=>{
      const sel = +c.dataset.id===id;
      c.classList.toggle('selected', sel);
      c.setAttribute('aria-checked', sel);
    });
    localStorage.setItem(CHAR_KEY, id);
    selectedInfo.textContent = 'Selected: ' + characters.find(c=>c.id===id).name;
    btnStart.disabled = false;
  }

  function clearSelection() {
    selectedId = null; localStorage.removeItem(CHAR_KEY);
    document.querySelectorAll('.character-card').forEach(c=>{c.classList.remove('selected');c.setAttribute('aria-checked','false');});
    selectedInfo.textContent=''; btnStart.disabled=true;
    conqueredCups = []; localStorage.removeItem(CUPS_KEY);
  }

  // ═══════════════════════════════════════════
  //  ORBIT MAP
  // ═══════════════════════════════════════════
  function buildMap(playerCh) {
    if (orbitAnimId) cancelAnimationFrame(orbitAnimId);
    orbitScene.innerHTML = '';
    loadCups(); // refresh conquered list

    const remaining = characters.filter(c => c.id !== playerCh.id && !conqueredCups.includes(c.id));
    const allEnemies = characters.filter(c => c.id !== playerCh.id);

    playerBadge.textContent = '⚔ You: ' + playerCh.name;
    playerBadge.style.background = playerCh.color+'22';
    playerBadge.style.color = playerCh.color;
    playerBadge.style.border = '1px solid '+playerCh.color+'44';

    if (remaining.length === 0) {
      mapSubtitle.textContent = 'All planets conquered!';
      showWinScreen(playerCh);
      return false;
    }

    mapSubtitle.textContent = remaining.length + ' planet'+(remaining.length>1?'s':'')+' remaining';

    // Sun
    const sun = document.createElement('div'); sun.className='orbit-center'; orbitScene.appendChild(sun);

    // Orbit tracks
    const radii = [220, 170, 120];
    radii.forEach(r=>{
      const t=document.createElement('div'); t.className='orbit-track';
      t.style.width=r*2+'px'; t.style.height=r*2+'px';
      t.style.marginLeft=-r+'px'; t.style.marginTop=-r+'px';
      t.style.borderColor=playerCh.color+'44'; orbitScene.appendChild(t);
    });

    const planetData = allEnemies.map((enemy,i)=>{
      const item=document.createElement('div'); item.className='orbit-item';
      const wrapper=document.createElement('div'); wrapper.className='planet-wrapper';
      const hp=45; wrapper.style.left=(radii[i]-hp)+'px'; wrapper.style.top='-'+hp+'px';
      if (conqueredCups.includes(enemy.id)) wrapper.classList.add('conquered');

      const sphere=document.createElement('div');
      sphere.className='planet-sphere planet-'+enemy.colorName;
      sphere.style.setProperty('--glow-color',enemy.color+'66');
      sphere.style.setProperty('--planet-color',enemy.color);

      const atmos=document.createElement('div'); atmos.className='planet-atmosphere'; sphere.appendChild(atmos);
      const spec=document.createElement('div'); spec.className='planet-specular'; sphere.appendChild(spec);

      if (enemy.colorName==='red') {
        for (let ci=1;ci<=3;ci++){const cr=document.createElement('div');cr.className='planet-crater c'+ci;sphere.appendChild(cr);}
      } else if (enemy.colorName==='purple') {
        for (let bi=1;bi<=4;bi++){const b=document.createElement('div');b.className='planet-band b'+bi;sphere.appendChild(b);}
      } else if (enemy.colorName==='green') {
        for (let bi=1;bi<=3;bi++){const b=document.createElement('div');b.className='planet-band b'+bi;sphere.appendChild(b);}
      } else {
        for (let bi=1;bi<=3;bi++){const b=document.createElement('div');b.className='planet-band b'+bi;sphere.appendChild(b);}
      }

      const ring=document.createElement('div'); ring.className='planet-ring';
      ring.style.borderColor=enemy.color; ring.style.width='130px'; ring.style.height='32px';
      sphere.appendChild(ring);

      const name=document.createElement('div'); name.className='planet-name';
      name.style.setProperty('--planet-color',enemy.color); name.textContent=enemy.name;

      wrapper.appendChild(sphere); wrapper.appendChild(name); item.appendChild(wrapper);
      orbitScene.appendChild(item);

      wrapper.addEventListener('click',(e)=>{
        e.stopPropagation();
        if (conqueredCups.includes(enemy.id)) return;
        startShooter(playerCh, enemy);
      });

      return {item, wrapper, radius:radii[i], speed:[0.003,0.005,0.007][i], angle:(i*Math.PI*2)/3, enemy};
    });

    let lastTime=0;
    function animate(ts){
      if(!lastTime)lastTime=ts;
      const dt=Math.min((ts-lastTime)/1000,0.1); lastTime=ts;
      planetData.forEach(p=>{
        p.angle+=p.speed*(dt*60);
        const deg=p.angle*(180/Math.PI);
        p.item.style.transform='rotate('+deg+'deg)';
        p.wrapper.style.transform='rotate('+(-deg)+'deg)';
      });
      orbitAnimId=requestAnimationFrame(animate);
    }
    orbitAnimId=requestAnimationFrame(animate);
    return true;
  }

  // ═══════════════════════════════════════════
  //  TOP-DOWN SHOOTER
  // ═══════════════════════════════════════════
  let shootState = null;
  let shootImages = {};
  let keys = {};
  let mouseX = 0, mouseY = 0;

  function startShooter(playerCh, enemyPlanet) {
    if (orbitAnimId) cancelAnimationFrame(orbitAnimId);
    if (gameAnimId) cancelAnimationFrame(gameAnimId);

    const W = 800, H = 600;
    gameCanvas.width = W; gameCanvas.height = H;
    gameCanvas.style.width = W+'px'; gameCanvas.style.height = H+'px';

    // Preload images
    shootImages = {};
    shootImages.player = new Image(); shootImages.player.src = playerCh.src;
    shootImages.enemy = new Image(); shootImages.enemy.src = enemyPlanet.src;
    shootImages.loaded = false;
    let toLoad=2, loaded=0;
    [shootImages.player, shootImages.enemy].forEach(img=>{
      img.onload=img.onerror=()=>{loaded++;if(loaded>=toLoad)shootImages.loaded=true;};
    });

    const state = {
      playerCh, enemyPlanet,
      px: W/2, py: H/2,  // player center
      radius: 16, speed: 260,
      bullets: [],
      enemies: [],
      particles: [],
      wave: 1,
      maxWaves: 3,
      enemiesRemaining: 0,
      waveActive: false,
      waveDelay: 0,
      hearts: 3,
      invulnUntil: 0,
      shakeTime: 0,
      lastTime: 0,
    };

    gamePlanetLabel.textContent = enemyPlanet.name + "'s Planet";
    gamePlanetLabel.style.color = enemyPlanet.color;
    showScreen('game');
    gameMsg.classList.remove('show');

    shootState = state;
    spawnWave(state);

    function gameLoop(ts) {
      if (!shootState) return;
      const s = shootState;
      if (!s.lastTime) s.lastTime = ts;
      const dt = Math.min((ts - s.lastTime)/1000, 0.05);
      s.lastTime = ts;

      // Wave delay
      if (s.waveDelay > 0) {
        s.waveDelay -= dt;
        if (s.waveDelay <= 0 && s.enemies.length === 0 && s.enemiesRemaining === 0) {
          if (s.wave > s.maxWaves) {
            // Planet conquered!
            conqueredCups.push(s.enemyPlanet.id);
            localStorage.setItem(CUPS_KEY, JSON.stringify(conqueredCups));
            showMessage('Planet Conquered!', s.enemyPlanet.color);
            setTimeout(()=>{
              shootState=null; gameAnimId=null;
              const remaining = characters.filter(c=>c.id!==s.playerCh.id && !conqueredCups.includes(c.id));
              if (remaining.length===0) showWinScreen(s.playerCh);
              else { showScreen('map'); buildMap(s.playerCh); }
            }, 2000);
            return;
          }
          s.wave++;
          spawnWave(s);
        }
      }

      // Player movement
      let dx=0, dy=0;
      if (keys['arrowup']||keys['w']) dy-=1;
      if (keys['arrowdown']||keys['s']) dy+=1;
      if (keys['arrowleft']||keys['a']) dx-=1;
      if (keys['arrowright']||keys['d']) dx+=1;
      if (dx!==0||dy!==0) {
        const len = Math.sqrt(dx*dx+dy*dy);
        dx/=len; dy/=len;
      }
      s.px += dx*s.speed*dt;
      s.py += dy*s.speed*dt;
      s.px = Math.max(s.radius, Math.min(W-s.radius, s.px));
      s.py = Math.max(s.radius, Math.min(H-s.radius, s.py));

      // Bullets
      for (let i=s.bullets.length-1;i>=0;i--) {
        const b = s.bullets[i];
        b.x += b.vx*dt; b.y += b.vy*dt;
        b.life -= dt;
        if (b.life<=0 || b.x<0||b.x>W||b.y<0||b.y>H) { s.bullets.splice(i,1); continue; }
        // Hit enemies
        for (let j=s.enemies.length-1;j>=0;j--) {
          const e = s.enemies[j];
          const edx=b.x-e.x, edy=b.y-e.y;
          if (Math.sqrt(edx*edx+edy*edy) < e.radius+5) {
            s.bullets.splice(i,1);
            s.enemies.splice(j,1);
            s.enemiesRemaining--;
            spawnParticles(s, e.x, e.y, s.enemyPlanet.color);
            break;
          }
        }
      }

      // Enemies
      for (const e of s.enemies) {
        const edx=s.px-e.x, edy=s.py-e.y;
        const dist = Math.sqrt(edx*edx+edy*edy);
        if (dist>1) { e.x+=(edx/dist)*e.speed*dt; e.y+=(edy/dist)*e.speed*dt; }
      }

      // Enemy collision
      if (ts > s.invulnUntil) {
        for (const e of s.enemies) {
          const edx=s.px-e.x, edy=s.py-e.y;
          if (Math.sqrt(edx*edx+edy*edy) < s.radius+e.radius) {
            s.hearts--;
            s.invulnUntil = ts + 1500;
            s.shakeTime = 0.3;
            if (s.hearts <= 0) {
              showMessage('Game Over!', '#ff4d6a');
              setTimeout(()=>{ shootState=null; showScreen('map'); buildMap(s.playerCh); }, 1500);
              gameAnimId=null; return;
            }
            showMessage('Hit!', '#ff4d6a');
            setTimeout(()=>gameMsg.classList.remove('show'), 600);
          }
        }
      }

      // Particles
      for (let i=s.particles.length-1;i>=0;i--) {
        const p=s.particles[i];
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
        if (p.life<=0) s.particles.splice(i,1);
      }

      // Shake
      if (s.shakeTime>0) s.shakeTime-=dt;

      // Wave clear check
      if (s.waveActive && s.enemies.length===0 && s.enemiesRemaining===0) {
        s.waveActive = false;
        s.waveDelay = 1.5;
        showMessage('Wave '+s.wave+' Clear!', '#ffd700');
        setTimeout(()=>gameMsg.classList.remove('show'), 1200);
      }

      drawShooter(s, W, H);
      gameAnimId = requestAnimationFrame(gameLoop);
    }
    gameAnimId = requestAnimationFrame(gameLoop);
  }

  function spawnWave(s) {
    const baseCount = 5 + s.wave*3;
    s.enemiesRemaining = baseCount;
    s.waveActive = true;
    const speedBase = 100 + s.wave*25;
    const spawnDelay = 300;
    let spawned = 0;

    function spawnOne() {
      if (!shootState || spawned>=baseCount) return;
      const side = Math.floor(Math.random()*4);
      let x, y;
      const W=800,H=600;
      const margin=30;
      if (side===0){x=Math.random()*W;y=-margin;}        // top
      else if (side===1){x=W+margin;y=Math.random()*H;}  // right
      else if (side===2){x=Math.random()*W;y=H+margin;}  // bottom
      else {x=-margin;y=Math.random()*H;}                 // left
      s.enemies.push({x,y,radius:14,speed:speedBase+Math.random()*40});
      spawned++;
      setTimeout(spawnOne, spawnDelay);
    }
    spawnOne();
  }

  function spawnParticles(s, x, y, color) {
    for (let i=0;i<12;i++) {
      const angle=Math.random()*Math.PI*2;
      const speed=80+Math.random()*200;
      s.particles.push({
        x,y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
        life:0.4+Math.random()*0.4, color, size:2+Math.random()*3
      });
    }
  }

  function drawShooter(s, W, H) {
    const ctx = gameCanvas.getContext('2d');
    ctx.save();

    // Screen shake
    if (s.shakeTime>0) {
      const sx=(Math.random()-0.5)*8, sy=(Math.random()-0.5)*8;
      ctx.translate(sx,sy);
    }

    // Background
    const bgGrad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);
    const pc=s.enemyPlanet.color;
    bgGrad.addColorStop(0, pc+'15'); bgGrad.addColorStop(1, '#050510');
    ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);

    // Arena ring
    ctx.strokeStyle=pc+'33'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(W/2,H/2,280,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=pc+'15'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(W/2,H/2,200,0,Math.PI*2); ctx.stroke();

    // Stars
    for (let i=0;i<40;i++) {
      const sx=(i*173+37)%W, sy=(i*241+89)%H;
      ctx.globalAlpha=0.15+Math.sin(i+Date.now()/2000)*0.1;
      ctx.fillStyle=pc; ctx.fillRect(sx,sy,1.2,1.2);
    }
    ctx.globalAlpha=1;

    // Particles
    for (const p of s.particles) {
      ctx.globalAlpha=p.life/0.8;
      ctx.fillStyle=p.color; ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Bullets
    ctx.fillStyle='#fff';
    for (const b of s.bullets) {
      ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
      // Glow
      const g=ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,7);
      g.addColorStop(0,'#fff'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(b.x-7,b.y-7,14,14);
    }
    ctx.fillStyle='#fff';

    // Enemies
    const eImg=shootImages.enemy;
    const eReady=shootImages.loaded&&eImg.complete&&eImg.naturalWidth;
    for (const e of s.enemies) {
      const r=e.radius;
      // Red glow
      const eg=ctx.createRadialGradient(e.x,e.y,r*0.5,e.x,e.y,r*1.6);
      eg.addColorStop(0,'rgba(255,40,40,0.4)'); eg.addColorStop(1,'transparent');
      ctx.fillStyle=eg; ctx.fillRect(e.x-r*1.6,e.y-r*1.6,r*3.2,r*3.2);
      // Head
      ctx.save(); ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.clip();
      if (eReady) ctx.drawImage(eImg,e.x-r,e.y-r,r*2,r*2);
      else { ctx.fillStyle=s.enemyPlanet.color; ctx.fillRect(e.x-r,e.y-r,r*2,r*2); }
      ctx.restore();
      ctx.strokeStyle='#ff3333'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke();
    }

    // Player
    const invuln=Date.now()<s.invulnUntil;
    if (invuln&&Math.floor(Date.now()/120)%2===0) ctx.globalAlpha=0.35;
    const pImg=shootImages.player;
    const pReady=shootImages.loaded&&pImg.complete&&pImg.naturalWidth;
    const r=s.radius;
    const pg=ctx.createRadialGradient(s.px,s.py,r*0.5,s.px,s.py,r*2);
    pg.addColorStop(0,s.playerCh.color+'88'); pg.addColorStop(1,'transparent');
    ctx.fillStyle=pg; ctx.fillRect(s.px-r*2,s.py-r*2,r*4,r*4);
    ctx.save(); ctx.beginPath(); ctx.arc(s.px,s.py,r,0,Math.PI*2); ctx.clip();
    if (pReady) ctx.drawImage(pImg,s.px-r,s.py-r,r*2,r*2);
    else { ctx.fillStyle=s.playerCh.color; ctx.fillRect(s.px-r,s.py-r,r*2,r*2); }
    ctx.restore();
    ctx.strokeStyle=s.playerCh.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(s.px,s.py,r,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;

    // Crosshair line
    const angle = Math.atan2(mouseY-H/2, mouseX-W/2);
    ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
    ctx.setLineDash([4,8]);
    ctx.beginPath(); ctx.moveTo(s.px,s.py);
    ctx.lineTo(s.px+Math.cos(angle)*200,s.py+Math.sin(angle)*200);
    ctx.stroke(); ctx.setLineDash([]);

    ctx.restore();

    // HUD
    document.getElementById('gameLives').textContent='❤️'.repeat(s.hearts);
    document.getElementById('gameCupsLabel').textContent='Wave '+s.wave+'/'+s.maxWaves+' | Enemies: '+s.enemiesRemaining;
  }

  function showMessage(text, color) {
    gameMsg.textContent=text; gameMsg.style.color=color;
    gameMsg.classList.add('show');
    setTimeout(()=>gameMsg.classList.remove('show'), 1200);
  }

  // ── Mouse tracking ──
  gameCanvas.addEventListener('mousemove', (e)=>{
    const rect = gameCanvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  gameCanvas.addEventListener('click', (e)=>{
    if (!shootState) return;
    const s=shootState;
    const angle=Math.atan2(mouseY-300, mouseX-400); // relative to center (W/2=400,H/2=300)
    const bulletSpeed=600;
    s.bullets.push({
      x:s.px+Math.cos(angle)*18, y:s.py+Math.sin(angle)*18,
      vx:Math.cos(angle)*bulletSpeed, vy:Math.sin(angle)*bulletSpeed,
      life:1.5
    });
  });

  // ── Keyboard tracking ──
  document.addEventListener('keydown', (e)=>{
    keys[e.key.toLowerCase()] = true;
    if (e.key==='ArrowUp'||e.key==='ArrowDown'||e.key==='ArrowLeft'||e.key==='ArrowRight') e.preventDefault();
  });
  document.addEventListener('keyup', (e)=>{
    keys[e.key.toLowerCase()] = false;
  });

  // ═══════════════════════════════════════════
  //  WIN SCREEN
  // ═══════════════════════════════════════════
  function showWinScreen(playerCh) {
    if (gameAnimId) cancelAnimationFrame(gameAnimId);
    shootState=null;

    winCharImg.src = playerCh.src;
    winText.textContent = playerCh.name + ' has conquered all planets!';

    winCupsDiv.innerHTML='';
    conqueredCups.forEach(cupId=>{
      const cupCh = characters.find(c=>c.id===cupId);
      const cup=document.createElement('div'); cup.className='win-cup';
      const body=document.createElement('div'); body.className='cup-body';
      body.style.background=cupCh.color; body.style.setProperty('--cup-glow',cupCh.color+'88');
      const stem=document.createElement('div'); stem.className='cup-stem';
      const base=document.createElement('div'); base.className='cup-base';
      cup.appendChild(body); cup.appendChild(stem); cup.appendChild(base);
      winCupsDiv.appendChild(cup);
    });

    showScreen('win');
  }

  // ═══════════════════════════════════════════
  //  EVENT HANDLERS
  // ═══════════════════════════════════════════
  function startGame() {
    if (!selectedId) return;
    const playerCh = characters.find(c=>c.id===selectedId);
    loadCups();
    if (buildMap(playerCh)) {
      showScreen('map');
    }
    startMusic();
  }
  window.startGame = startGame;
  btnStart.addEventListener('click', startGame);

  btnReset.addEventListener('click', ()=>{
    clearSelection();
    conqueredCups=[]; localStorage.removeItem(CUPS_KEY);
  });

  btnBack.addEventListener('click', ()=>{
    if (orbitAnimId) cancelAnimationFrame(orbitAnimId);
    showScreen('select');
  });

  btnLeave.addEventListener('click', ()=>{
    if (gameAnimId) cancelAnimationFrame(gameAnimId);
    shootState=null;
    gameMsg.classList.remove('show');
    const playerCh = characters.find(c=>c.id===selectedId);
    showScreen('map'); buildMap(playerCh);
  });

  btnPlayAgain.addEventListener('click', ()=>{
    conqueredCups=[]; localStorage.removeItem(CUPS_KEY);
    clearSelection();
    showScreen('select');
  });

  // Restore previous selection
  const saved = localStorage.getItem(CHAR_KEY);
  if (saved) selectCharacter(+saved);

})();
</script>
